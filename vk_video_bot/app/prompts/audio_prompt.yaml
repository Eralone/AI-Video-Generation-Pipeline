system: |
  Создай контекстный промт для TTS-системы VoiSpark.

  Описание голоса (voice_prompt): {voice_prompt}
  Текст для озвучки: {audio_script}

  Промт должен содержать:
  1. Точное описание голоса из voice_prompt (пол, возраст, тембр)
  2. Стиль подачи, подходящий к тексту (темп, эмоциональность)
  3. Указание на разговорный формат (не дикторский)
  4. Акцент на естественные паузы и интонации

  Верни ТОЛЬКО текст промта, без пояснений.
