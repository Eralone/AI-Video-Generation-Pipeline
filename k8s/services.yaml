apiVersion: v1
kind: Service
metadata:
  name: vkbot-svc
  namespace: vkbot
spec:
  selector:
    app: vkbot
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vkbot-ingress
  namespace: vkbot
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: your-domain.ru
      http:
        paths:
          - path: /vk/callback
            pathType: Prefix
            backend:
              service:
                name: vkbot-svc
                port:
                  number: 80

